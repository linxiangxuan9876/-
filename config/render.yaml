# Render 部署配置 - 使用 Aiven PostgreSQL
# 注意：DATABASE_URL 需要在 Render Dashboard 中设置环境变量
services:
  - type: web
    name: store-knowledge-base
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # 从 Render Dashboard 环境变量获取，不在代码中暴露
      - key: SECRET_KEY
        generateValue: true
      - key: UPLOAD_DIR
        value: /tmp/uploads/docs
      - key: QA_UPLOAD_DIR
        value: /tmp/uploads/qa
      - key: PYTHON_VERSION
        value: 3.11.0
